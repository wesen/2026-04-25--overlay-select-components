<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    width: 320px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    color: #333;
    background: #fff;
  }
  .header {
    padding: 12px 16px;
    border-bottom: 1px solid #eee;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 {
    margin: 0;
    font-size: 14px;
    font-weight: 700;
    color: #1a1a2e;
  }
  .header .badge {
    background: #0066ff;
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .controls {
    padding: 12px 16px;
    border-bottom: 1px solid #eee;
    display: flex;
    gap: 8px;
  }
  button {
    flex: 1;
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary {
    background: #0066ff;
    color: #fff;
  }
  .btn-primary:hover { background: #0052cc; }
  .btn-primary.active {
    background: #00b894;
  }
  .btn-secondary {
    background: #f0f0f0;
    color: #555;
  }
  .btn-secondary:hover { background: #e0e0e0; }
  .btn-danger {
    background: #ff6b6b;
    color: #fff;
  }
  .btn-danger:hover { background: #ee5a5a; }
  .info {
    padding: 8px 16px;
    font-size: 11px;
    color: #888;
    border-bottom: 1px solid #eee;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .selections {
    max-height: 300px;
    overflow-y: auto;
  }
  .selection-item {
    padding: 10px 16px;
    border-bottom: 1px solid #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .selection-item:hover {
    background: #fafafa;
  }
  .selection-name {
    font-weight: 600;
    color: #1a1a2e;
    font-size: 12px;
  }
  .selection-meta {
    font-size: 10px;
    color: #aaa;
    margin-top: 2px;
  }
  .selection-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .icon-btn {
    width: 24px;
    height: 24px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    cursor: pointer;
    border-radius: 4px;
    color: #888;
    font-size: 14px;
    flex: none;
  }
  .icon-btn:hover {
    background: #f0f0f0;
    color: #333;
  }
  .empty {
    padding: 24px 16px;
    text-align: center;
    color: #aaa;
    font-size: 12px;
  }
  .export-area {
    padding: 12px 16px;
    border-top: 1px solid #eee;
  }
</style>
</head>
<body>
  <div class="header">
    <h1>🎯 Pyxis Extractor</h1>
    <span class="badge" id="countBadge">0</span>
  </div>
  <div class="controls">
    <button id="toggleBtn" class="btn-primary">Start Selecting</button>
    <button id="clearBtn" class="btn-danger">Clear</button>
  </div>
  <div class="info" id="pageInfo">—</div>
  <div class="selections" id="selectionsList">
    <div class="empty">No selections yet. Click "Start Selecting" and click on page elements.</div>
  </div>
  <div class="export-area">
    <button id="exportBtn" class="btn-secondary" style="width:100%">📥 Export JSON Manifest</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
